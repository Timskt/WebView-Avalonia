name: Build and Pack NuGet

on:
  push:
    branches: [main, master, ai-mac-fix]
  pull_request:
    branches: [main, master, ai-mac-fix]
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: "WebView/WebViewControl.Avalonia/WebViewControl.Avalonia.csproj"
  CONFIGURATION: "ReleaseAvalonia"

jobs:
  build-and-pack:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (CEF 120)
          - os: macos-14
            platform: ARM64
            label: macos-arm64
          - os: macos-13
            platform: x64
            label: macos-x64
          # Windows 10+ (CEF 120)
          - os: windows-latest
            platform: x64
            label: win10-x64
            extra_props: ""
          - os: windows-latest
            platform: ARM64
            label: win10-arm64
            extra_props: ""
          # Windows 7 compatible (CEF 106)
          - os: windows-latest
            platform: x64
            label: win7-x64
            extra_props: "-p:Win7Compatible=true"
          - os: windows-latest
            platform: ARM64
            label: win7-arm64
            extra_props: "-p:Win7Compatible=true"
          # Linux (CEF 120)
          - os: ubuntu-latest
            platform: x64
            label: linux-x64

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build project
        run: |
          dotnet build ${{ env.PROJECT_PATH }} \
            -c ${{ env.CONFIGURATION }} \
            -p:Platform=${{ matrix.platform }} \
            ${{ matrix.extra_props }}

      - name: Pack NuGet package
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            -c ${{ env.CONFIGURATION }} \
            -p:Platform=${{ matrix.platform }} \
            ${{ matrix.extra_props }} \
            --output ./nupkgs

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ matrix.label }}
          path: nupkgs/*.nupkg
          retention-days: 30

  publish-nuget:
    needs: build-and-pack
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download all NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nupkgs-*
          merge-multiple: true
          path: ./nupkgs

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet.org
        shell: bash
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
