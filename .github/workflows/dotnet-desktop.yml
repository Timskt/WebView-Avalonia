name: Build and Pack NuGet

on:
  push:
    branches: [ main, master, ai-mac-fix ]
  pull_request:
    branches: [ main, master, ai-mac-fix ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'ReleaseAvalonia'
        type: choice
        options:
          - ReleaseAvalonia
          - Debug
      runtime:
        description: 'Runtime identifier'
        required: true
        default: 'osx-arm64'
        type: choice
        options:
          - osx-arm64
          - osx-x64
          - win-x64
          - win-arm64
          - linux-x64

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-pack:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon
            runtime: osx-arm64
          - os: macos-13          # Intel (避免 ARM Mac 交叉编译 x64 的潜在问题)
            runtime: osx-x64
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 在非 Windows 系统上启用 Windows 目标构建能力（项目内若含 Windows 目标必须开启）
      - name: Build and restore
        shell: bash
        run: |
          EXTRA_PROPERTIES=""
          if [ "${{ runner.os }}" != "Windows" ]; then
            EXTRA_PROPERTIES="/p:EnableWindowsTargeting=true"
          fi

          dotnet build WebView/WebView.sln \
            -c ReleaseAvalonia \
            -r ${{ matrix.runtime }} \
            $EXTRA_PROPERTIES

      # 打包 NuGet（注意：pack 不能使用 -r 参数）
      - name: Pack NuGet package for WebViewControl.Avalonia
        shell: bash
        run: |
          EXTRA_PROPERTIES=""
          if [ "${{ runner.os }}" != "Windows" ]; then
            EXTRA_PROPERTIES="/p:EnableWindowsTargeting=true"
          fi

          cd WebView/WebViewControl.Avalonia
          dotnet pack \
            -c ReleaseAvalonia \
            --output ./nupkgs \
            /p:VersionSuffix=${{ github.run_number }} \
            $EXTRA_PROPERTIES

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ matrix.os }}-${{ matrix.runtime }}
          path: WebView/WebViewControl.Avalonia/nupkgs/*.nupkg
          retention-days: 30

  publish-nuget:
    needs: build-and-pack
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download all NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nupkgs-*
          merge-multiple: true
          path: ./nupkgs

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
