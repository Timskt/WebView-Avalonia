name: Build and Pack NuGet

on:
  push:
    branches: [ main, master, ai-mac-fix ]
  pull_request:
    branches: [ main, master, ai-mac-fix ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'ReleaseAvalonia'
        type: choice
        options:
          - ReleaseAvalonia
          - Debug
      runtime:
        description: 'Runtime identifier'
        required: true
        default: 'osx-arm64'
        type: choice
        options:
          - osx-arm64
          - osx-x64
          - win-x64
          - win-arm64
          - linux-x64

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'WebView/WebViewControl.Avalonia/WebViewControl.Avalonia.csproj'

jobs:
  build-and-pack:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon
            runtime: osx-arm64
          - os: macos-13          # Intel (避免 ARM Mac 交叉编译 x64 的潜在问题)
            runtime: osx-x64
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 构建项目（注意：只能对 .csproj 指定 -r）
      - name: Build project
        shell: bash
        run: |
          EXTRA_PROPERTIES=""
          if [ "${{ runner.os }}" != "Windows" ]; then
            EXTRA_PROPERTIES="/p:EnableWindowsTargeting=true"
          fi

          dotnet build ${{ env.PROJECT_PATH }} \
            -c ReleaseAvalonia \
            -r ${{ matrix.runtime }} \
            $EXTRA_PROPERTIES

      # 打包（pack 不接受 -r，但需要 EnableWindowsTargeting 以避免 Windows 目标错误）
      - name: Pack NuGet package
        shell: bash
        run: |
          EXTRA_PROPERTIES=""
          if [ "${{ runner.os }}" != "Windows" ]; then
            EXTRA_PROPERTIES="/p:EnableWindowsTargeting=true"
          fi

          dotnet pack ${{ env.PROJECT_PATH }} \
            -c ReleaseAvalonia \
            --output ./nupkgs \
            /p:VersionSuffix=${{ github.run_number }} \
            $EXTRA_PROPERTIES

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ matrix.os }}-${{ matrix.runtime }}
          path: nupkgs/*.nupkg
          retention-days: 30

  publish-nuget:
    needs: build-and-pack
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download all NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nupkgs-*
          merge-multiple: true
          path: ./nupkgs

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
