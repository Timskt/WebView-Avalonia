name: Build and Pack NuGet

on:
  push:
    branches: [ main, master,ai-mac-fix ]
  pull_request:
    branches: [ main, master,ai-mac-fix ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'ReleaseAvalonia'
        type: choice
        options:
          - ReleaseAvalonia
          - Debug
      runtime:
        description: 'Runtime identifier'
        required: true
        default: 'osx-arm64'
        type: choice
        options:
          - osx-arm64
          - osx-x64
          - win-x64
          - win-arm64
          - linux-x64

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-pack:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            runtime: osx-arm64
          - os: macos-latest
            runtime: osx-x64
          - os: windows-latest
            runtime: win-x64
          - os: windows-latest
            runtime: win-arm64
          - os: ubuntu-latest
            runtime: linux-x64
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set Windows targeting property
      id: windows_targeting
      shell: bash
      run: |
        if [[ "${{ runner.os }}" != "Windows" && "${{ matrix.runtime }}" == win-* ]]; then
          echo "ENABLE_WINDOWS_TARGETING=true" >> $GITHUB_OUTPUT
        else
          echo "ENABLE_WINDOWS_TARGETING=false" >> $GITHUB_OUTPUT
        fi

    - name: Restore dependencies
      run: dotnet restore WebView/WebView.sln -r ${{ matrix.runtime }} /p:EnableWindowsTargeting=${{ steps.windows_targeting.outputs.ENABLE_WINDOWS_TARGETING == 'true' && 'true' || 'false' }}

    - name: Build solution
      run: dotnet build WebView/WebView.sln -c ReleaseAvalonia --no-restore -r ${{ matrix.runtime }} /p:EnableWindowsTargeting=${{ steps.windows_targeting.outputs.ENABLE_WINDOWS_TARGETING == 'true' && 'true' || 'false' }}

    - name: Pack NuGet package for WebViewControl.Avalonia
      run: |
        cd WebView/WebViewControl.Avalonia
        dotnet pack -c ReleaseAvalonia -r ${{ matrix.runtime }} --output ./nupkgs /p:VersionSuffix=${{ github.run_number }} /p:EnableWindowsTargeting=${{ steps.windows_targeting.outputs.ENABLE_WINDOWS_TARGETING == 'true' && 'true' || 'false' }}
